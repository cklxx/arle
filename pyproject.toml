[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-infer"
version = "0.1.0"
description = "Agent system built on Dynamo + Pegainfer"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27",
    "tokenizers>=0.20",
]

[project.optional-dependencies]
serve = [
    "starlette>=0.40",
    "uvicorn>=0.30",
]
mlx = [
    "mlx>=0.20",
    "mlx-lm>=0.20",
    "psutil>=5.9",
    "starlette>=0.40",
    "uvicorn>=0.30",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
]

[project.scripts]
agent-infer = "agent_infer.__main__:main"

[tool.setuptools.packages.find]
include = ["agent_infer*"]
