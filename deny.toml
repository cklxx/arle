[graph]
# Audit against the default feature set (cuda).
#
# We deliberately do NOT set `all-features = true`: `infer` exposes two
# mutually exclusive features (`rdma-nixl` stub vs `rdma-nixl-real`) that
# both alias the same `nixl-sys` crate, and `--all-features` activates them
# together — which trips a `cargo metadata` "depends on the same crate
# multiple times with different names" error before cargo-deny gets to run.
# The non-default rdma-nixl path is the same upstream crate (just a
# stub-vs-real link surface), so license/ban audit value is identical to
# the default surface.

[advisories]
version = 2
yanked = "warn"
# Open advisories tracked but not yet fixed at the source. Each entry is a
# "we know about this, dependency bump is queued" stake — revisit when
# upstream lands a fix or when we touch the dep deliberately.
ignore = [
    # `paste` proc-macro is unmaintained. Pulled in transitively by several
    # crates; no actively-exploited security implication, low priority swap.
    "RUSTSEC-2024-0436",
    # `rand::rng()` unsound with a custom logger. We do not install a
    # custom global logger that would trigger the unsound path; track the
    # `rand` 0.10 fix when it ships.
    "RUSTSEC-2026-0097",
    # Three `rustls`/`webpki`/CRL-related vulnerabilities. Pulled in via
    # reqwest's TLS path. Bumping the TLS stack is queued as a deliberate
    # PR; ignoring here so dep-bumps unrelated to TLS don't get blocked.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    # CDLA-Permissive-2.0 = Linux Foundation Community Data License Agreement
    # (permissive). Pulled in by transitive deps such as `webpki-roots`.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Python-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
