[graph]
# Audit against the default feature set (cuda).
#
# We deliberately do NOT set `all-features = true`: `infer` exposes two
# mutually exclusive features (`rdma-nixl` stub vs `rdma-nixl-real`) that
# both alias the same `nixl-sys` crate, and `--all-features` activates them
# together — which trips a `cargo metadata` "depends on the same crate
# multiple times with different names" error before cargo-deny gets to run.
# The non-default rdma-nixl path is the same upstream crate (just a
# stub-vs-real link surface), so license/ban audit value is identical to
# the default surface.

[advisories]
version = 2
yanked = "warn"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Python-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
private = { ignore = true }

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
