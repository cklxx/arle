[package]
name = "agent-infer"
version = "0.1.0"
edition = "2024"

[dependencies]
pegainfer = { path = "pegainfer" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4", features = ["derive"] }
log = "0.4"
logforth = { version = "0.29", features = ["starter-log", "layout-text"] }
rand = "0.10"
regex = "1"
