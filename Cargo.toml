[package]
name = "agent-infer"
version = "0.1.0"
edition = "2024"

[features]
# Enable CUDA (mirrors pegainfer's cuda feature). Default on, like pegainfer.
default = ["cuda"]
cuda = ["pegainfer/cuda"]
dynamo = ["dep:dynamo-runtime", "dep:tokio"]
# Marker feature for CPU-only builds (CI, macOS). Pass --no-default-features --features no-cuda.
no-cuda = ["pegainfer/no-cuda"]

[dependencies]
dynamo-runtime = { path = "dynamo/lib/runtime", optional = true }
tokio = { version = "1", features = ["full"], optional = true }
pegainfer = { path = "pegainfer", default-features = false }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
clap = { version = "4", features = ["derive"] }
log = "0.4"
logforth = { version = "0.29", features = ["starter-log", "layout-text"] }
rand = "0.10"
regex = "1"
