[workspace]
members = [".", "infer", "infer/mlx-sys", "crates/infer-agent", "crates/infer-chat", "crates/infer-cli", "crates/infer-core", "crates/infer-engine", "crates/infer-observability", "crates/infer-policy", "crates/infer-tools"]

[package]
name = "agent-infer"
version = "0.1.0"
edition = "2024"

[features]
# Enable CUDA (mirrors infer's cuda feature). Default on, like infer.
default = ["cuda"]
cli = ["dep:infer-cli"]
cuda = ["infer-cli/cuda"]
# Marker feature for CPU-only builds (CI, macOS). Pass --no-default-features --features no-cuda.
no-cuda = ["infer-cli/no-cuda"]
# Development-oriented CPU backend. Use with --no-default-features --features cpu,no-cuda.
cpu = ["infer-cli/cpu"]
# Metal backend via mlx-rs (Apple Silicon). Use with --no-default-features --features metal,no-cuda.
metal = ["infer-cli/metal"]

[dependencies]
anyhow = "1.0"
infer-cli = { path = "crates/infer-cli", default-features = false, optional = true }

[dev-dependencies]
infer = { path = "infer", default-features = false }

[[bin]]
name = "agent-infer"
path = "src/main.rs"
required-features = ["cli"]
