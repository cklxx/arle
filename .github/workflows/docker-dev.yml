name: Docker Dev Image

on:
  workflow_dispatch:
  push:
    tags:
      - "dev-*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/arle

jobs:
  docker-dev:
    name: Build dev image
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          sha="${GITHUB_SHA::8}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"
          echo "image=${IMAGE_NAME}:dev-${sha}" >> "${GITHUB_OUTPUT}"

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: dev
          platforms: linux/amd64
          load: ${{ !(github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: ${{ steps.tags.outputs.image }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:dev-cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:dev-cache,mode=max

      - name: Sanity check local image
        if: ${{ !(github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
        run: |
          docker run --rm "${{ steps.tags.outputs.image }}" bash -lc \
            'cargo --version && nvcc --version && zig version'

      - name: Sanity check pushed image
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          docker run --rm "${{ steps.tags.outputs.image }}" bash -lc \
            'cargo --version && nvcc --version && zig version'
