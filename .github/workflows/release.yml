name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── macOS arm64: Metal/MLX backend ──────────────────────────────────────────
  build-macos:
    name: Build macOS arm64 (Metal)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            .toolchains/zig
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-arm64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-arm64-cargo-

      - name: Set up Zig toolchain
        run: echo "ZIG=$(./scripts/setup_zig_toolchain.sh --print-zig)" >> "$GITHUB_ENV"

      - name: Build metal_serve + infer lib (Metal, no-cuda)
        run: >
          cargo build --release
          --no-default-features --features metal,no-cuda
          -p infer --lib --bin metal_serve

      - name: Build ARLE CLI (Metal, no-cuda)
        run: >
          cargo build --release
          --no-default-features --features metal,no-cuda,cli
          -p agent-infer --bin arle

      - name: Package macOS artifacts
        run: >
          ./scripts/package_macos_metal_artifact.sh
          arle-${{ github.ref_name }}-macos-arm64.tar.gz
          target/release/metal_serve
          target/release/arle

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: arle-${{ github.ref_name }}-macos-arm64.tar.gz

  # ── Linux x86_64: CUDA backend ───────────────────────────────────────────────
  build-linux:
    name: Build Linux x86_64 (CUDA)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install CUDA toolkit 12.8
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: network

      - name: Install Python build dependencies (required for AOT kernel compilation)
        # Keep release CUDA builds aligned with the repo build image and
        # cuda-kernels build script requirements.
        run: pip install --no-cache-dir -r requirements-build.txt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            .toolchains/zig
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-x86-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-x86-cargo-

      - name: Set up Zig toolchain
        run: echo "ZIG=$(./scripts/setup_zig_toolchain.sh --print-zig)" >> "$GITHUB_ENV"

      - name: Build infer + bench_serving (CUDA)
        env:
          # No GPU on CI runners — pin SM targets to avoid nvidia-smi probing.
          # T1 set: sm_80 (A100) + sm_86 (A10/3090) + sm_89 (L4/4090) + sm_90 (H100).
          # See docs/plans/sm-coverage.md for tier policy.
          TORCH_CUDA_ARCH_LIST: '8.0;8.6;8.9;9.0'
        run: cargo build --release --features cuda -p infer

      - name: Build ARLE CLI (CUDA)
        env:
          TORCH_CUDA_ARCH_LIST: '8.0;8.6;8.9;9.0'
        run: cargo build --release --features cli -p agent-infer --bin arle

      - name: Package Linux artifacts
        run: |
          mkdir -p dist
          cp target/release/infer dist/
          cp target/release/bench_serving dist/
          cp target/release/arle dist/
          tar -czf arle-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: arle-${{ github.ref_name }}-linux-x86_64.tar.gz

  # ── GitHub Release ────────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-x86_64

      - name: Check out repo (for install.sh)
        uses: actions/checkout@v4
        with:
          path: src

      - name: Stage install.sh
        run: cp src/scripts/install.sh install.sh

      - name: Generate release checksums
        run: sha256sum arle-${{ github.ref_name }}-*.tar.gz > SHA256SUMS.txt

      - name: Attest macOS artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: arle-${{ github.ref_name }}-macos-arm64.tar.gz

      - name: Attest Linux artifact provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: arle-${{ github.ref_name }}-linux-x86_64.tar.gz

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            arle-${{ github.ref_name }}-macos-arm64.tar.gz
            arle-${{ github.ref_name }}-linux-x86_64.tar.gz
            SHA256SUMS.txt
            install.sh

  # ── Homebrew tap bump ─────────────────────────────────────────────────────────
  # Requires repository secret HOMEBREW_TAP_TOKEN: a PAT (or fine-grained token)
  # with `Contents: Read and write` scope on cklxx/homebrew-tap.
  bump-homebrew:
    name: Bump Homebrew formula
    needs: create-release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-') }}  # skip pre-releases (e.g. v0.1.0-rc1)
    steps:
      - name: Update Formula/arle.rb in cklxx/homebrew-tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: arle
          formula-path: Formula/arle.rb
          homebrew-tap: cklxx/homebrew-tap
          base-branch: main
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/cklxx/arle/releases/download/${{ github.ref_name }}/arle-${{ github.ref_name }}-macos-arm64.tar.gz
          commit-message: |
            arle ${{ github.ref_name }}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
