name: CUDA CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'infer/src/**'
      - 'crates/cuda-kernels/**'
      - 'crates/cli/**'
      - 'crates/train/**'
      - 'crates/kv-native-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'scripts/setup_zig_toolchain.sh'
      - 'scripts/check_kv_zig.sh'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/cuda-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'infer/src/**'
      - 'crates/cuda-kernels/**'
      - 'crates/cli/**'
      - 'crates/train/**'
      - 'crates/kv-native-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'scripts/setup_zig_toolchain.sh'
      - 'scripts/check_kv_zig.sh'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/cuda-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CUDA_HOME: /usr/local/cuda

concurrency:
  group: cuda-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cuda-check:
    name: CUDA check + tiny fixture CLI
    runs-on: [self-hosted, linux, x64, gpu, cuda]
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v5
        with:
          path: |
            .toolchains/zig
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cuda-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cuda-

      - name: Set up Zig toolchain
        run: echo "ZIG=$(./scripts/setup_zig_toolchain.sh --print-zig)" >> "$GITHUB_ENV"

      - name: Run kv Zig validation
        run: ./scripts/check_kv_zig.sh

      - name: cargo check (cuda + no-cuda infer lib)
        run: cargo check -p infer --release --no-default-features --features cuda,no-cuda --lib

      - name: cargo check (cuda + no-cuda CLI)
        run: >
          cargo check -p agent-infer --release
          --no-default-features --features cuda,no-cuda,cli
          --bin arle

      - name: cargo test (cuda + no-cuda CLI crate)
        run: cargo test -p cli --release --no-default-features --features cuda,no-cuda

      - name: cargo test (cuda + no-cuda ARLE help/smoke path)
        run: >
          cargo test -p agent-infer --release
          --no-default-features --features cuda,no-cuda,cli
          --test cli_smoke

      - name: cargo test (cuda + no-cuda tiny fixture live path)
        run: >
          cargo test -p agent-infer --release
          --no-default-features --features cuda,no-cuda,cli
          --test cli_tiny_fixture_live
          -- --test-threads 1
