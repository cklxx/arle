name: Metal CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'infer/src/backend.rs'
      - 'infer/src/backend/**'
      - 'infer/src/bin/metal_serve.rs'
      - 'infer/src/bin/metal_request.rs'
      - 'crates/mlx-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'scripts/start_agent.sh'
      - 'Makefile'
      - 'README.md'
      - 'infer/src/bin/metal_bench.rs'
      - 'benchmarks/metal_baseline.json'
      - '.github/workflows/metal-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'infer/src/backend.rs'
      - 'infer/src/backend/**'
      - 'infer/src/bin/metal_serve.rs'
      - 'infer/src/bin/metal_request.rs'
      - 'crates/mlx-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'scripts/start_agent.sh'
      - 'Makefile'
      - 'README.md'
      - 'infer/src/bin/metal_bench.rs'
      - 'benchmarks/metal_baseline.json'
      - '.github/workflows/metal-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  metal-check:
    name: Metal check + test (Apple Silicon)
    runs-on: macos-14   # ARM64 Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-metal-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-metal-

      # Verify Metal C++ shim compiles and Rust type-checks cleanly.
      - name: cargo check (metal + no-cuda infer lib)
        working-directory: infer
        run: cargo check --no-default-features --features metal,no-cuda --lib --release

      - name: cargo check (metal + no-cuda CLI)
        run: cargo check --no-default-features --features metal,no-cuda,cli -p agent-infer --release

      - name: cargo test (metal + no-cuda)
        working-directory: infer
        run: >
          cargo test
          --no-default-features --features metal,no-cuda
          --lib --release
          -- --test-threads 1

      - name: cargo test (metal + no-cuda CLI unit tests)
        run: cargo test --no-default-features --features metal,no-cuda,cli -p agent-infer --release

      # Compile metal_bench binary to verify it links correctly.
      - name: cargo build metal_bench
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_bench --release

      # Validate that the baseline JSON is well-formed.
      # NOTE: Actually running benchmarks requires a model and a Metal GPU,
      # so the CI job only validates that the binary compiles and the
      # baseline JSON parses correctly.
      - name: Validate baseline JSON
        run: python3 -c "import json; json.load(open('benchmarks/metal_baseline.json'))"

      - name: Upload metal_bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: metal_bench-macos-arm64
          path: target/release/metal_bench
          if-no-files-found: error

  # On tagged releases: attach metal_bench to the GitHub Release.
  release-metal-artifacts:
    name: Attach Metal artifacts to Release
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: metal-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release metal_bench
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_bench --release

      - name: Attach metal_bench to Release
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/metal_bench
