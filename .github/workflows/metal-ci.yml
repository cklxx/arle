name: Metal CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'infer/src/**'
      - 'crates/mlx-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'crates/cli/**'
      - 'crates/train/**'
      - 'crates/kv-native-sys/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'scripts/start_agent.sh'
      - 'scripts/setup_zig_toolchain.sh'
      - 'scripts/check_kv_zig.sh'
      - 'setup.sh'
      - 'Makefile'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'docs/release-checklist.md'
      - 'docs/stability-policy.md'
      - 'docs/support-matrix.md'
      - 'scripts/package_macos_metal_artifact.sh'
      - '.github/workflows/release.yml'
      - 'benchmarks/metal_baseline.json'
      - '.github/workflows/metal-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'infer/src/**'
      - 'crates/mlx-sys/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - 'crates/cli/**'
      - 'crates/train/**'
      - 'crates/kv-native-sys/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'tests/**'
      - 'scripts/start_agent.sh'
      - 'scripts/setup_zig_toolchain.sh'
      - 'scripts/check_kv_zig.sh'
      - 'setup.sh'
      - 'Makefile'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'docs/release-checklist.md'
      - 'docs/stability-policy.md'
      - 'docs/support-matrix.md'
      - 'scripts/package_macos_metal_artifact.sh'
      - '.github/workflows/release.yml'
      - 'benchmarks/metal_baseline.json'
      - '.github/workflows/metal-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Match the SDK used to compile mlx C++ (which calls `@available(macOS 14, *)`),
  # otherwise the linker can't resolve `__isPlatformVersionAtLeast`.
  MACOSX_DEPLOYMENT_TARGET: "14.0"

concurrency:
  group: metal-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  metal-check:
    name: Metal check + test (Apple Silicon)
    runs-on: macos-14   # ARM64 Apple Silicon runner

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .toolchains/zig
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-metal-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-metal-

      - name: Set up Zig toolchain
        run: echo "ZIG=$(./scripts/setup_zig_toolchain.sh --print-zig)" >> "$GITHUB_ENV"

      - name: Run kv Zig validation
        run: ./scripts/check_kv_zig.sh

      # Verify Metal C++ shim compiles and Rust type-checks cleanly.
      - name: cargo check (metal + no-cuda infer lib)
        working-directory: infer
        run: cargo check --no-default-features --features metal,no-cuda --lib --release

      - name: cargo check (metal + no-cuda CLI)
        run: cargo check --no-default-features --features metal,no-cuda,cli -p agent-infer --release --bin arle

      - name: cargo check (metal train/autograd libs)
        run: |
          cargo check -p autograd --release --features metal --lib
          cargo check -p train --release --features metal --lib

      - name: cargo test (metal + no-cuda)
        working-directory: infer
        run: >
          cargo test
          --no-default-features --features metal,no-cuda
          --lib --release
          -- --test-threads 1

      - name: cargo test (metal + no-cuda CLI unit tests)
        run: cargo test --no-default-features --features metal,no-cuda,cli -p agent-infer --release

      - name: cargo test (metal + no-cuda tiny fixture live path)
        run: >
          cargo test
          --no-default-features --features metal,no-cuda,cli
          -p agent-infer --release
          --test cli_tiny_fixture_live
          -- --test-threads 1

      - name: cargo build metal_serve
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_serve --release

      # Keep metal_bench in CI as compile coverage only.
      - name: cargo build metal_bench
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_bench --release

      - name: cargo build ARLE CLI
        run: >
          cargo build
          --no-default-features --features metal,no-cuda,cli
          -p agent-infer --bin arle --release

      # Validate that the baseline JSON is well-formed.
      # NOTE: Actually running benchmarks requires a model and a Metal GPU,
      # so the CI job only validates that the binary compiles and the
      # baseline JSON parses correctly.
      - name: Validate baseline JSON
        run: python3 -c "import json; json.load(open('benchmarks/metal_baseline.json'))"

      - name: Package macOS Metal artifact
        run: >
          ./scripts/package_macos_metal_artifact.sh
          arle-macos-arm64.tar.gz
          target/release/metal_serve
          target/release/arle

      - name: Upload macOS Metal artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: arle-macos-arm64.tar.gz
          if-no-files-found: error
