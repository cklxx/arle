name: Metal CI

on:
  push:
    branches: [ main, master ]
    paths:
      - 'infer/src/metal_backend.rs'
      - 'infer/csrc/metal/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - '.github/workflows/metal-ci.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'infer/src/metal_backend.rs'
      - 'infer/csrc/metal/**'
      - 'infer/build.rs'
      - 'infer/Cargo.toml'
      - '.github/workflows/metal-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  metal-check:
    name: Metal check + test (Apple Silicon)
    runs-on: macos-14   # ARM64 Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            infer/target
          key: ${{ runner.os }}-metal-${{ hashFiles('infer/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-metal-

      # Verify Metal C++ shim compiles and Rust type-checks cleanly.
      - name: cargo check (metal + no-cuda)
        working-directory: infer
        run: cargo check --no-default-features --features metal,no-cuda --lib --release

      # Run unit tests; Metal GPU tests are #[ignore] so only non-GPU tests execute.
      - name: cargo test (metal + no-cuda, non-GPU)
        working-directory: infer
        run: cargo test --no-default-features --features metal,no-cuda --lib --release

      # Compile metal_bench binary to verify it links correctly.
      - name: cargo build metal_bench
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_bench --release

      # Upload metal_bench binary as a workflow artifact.
      - name: Upload metal_bench artifact
        uses: actions/upload-artifact@v4
        with:
          name: metal_bench-macos-arm64
          path: infer/target/release/metal_bench
          if-no-files-found: error

      # Upload libmetal_fused_ops.a for use as METAL_PREBUILT_URL target.
      - name: Find and upload libmetal_fused_ops.a
        run: |
          LIB=$(find infer/target/release/build -name 'libmetal_fused_ops.a' 2>/dev/null | head -1)
          if [ -n "$LIB" ]; then
            cp "$LIB" libmetal_fused_ops-arm64.a
          fi
      - name: Upload libmetal_fused_ops.a artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmetal_fused_ops-macos-arm64
          path: libmetal_fused_ops-arm64.a
          if-no-files-found: warn

  # On tagged releases: attach metal_bench to the GitHub Release.
  release-metal-artifacts:
    name: Attach Metal artifacts to Release
    runs-on: macos-14
    if: startsWith(github.ref, 'refs/tags/v')
    needs: metal-check

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build release metal_bench
        working-directory: infer
        run: >
          cargo build
          --no-default-features --features metal,no-cuda
          --bin metal_bench --release

      - name: Attach metal_bench to Release
        uses: softprops/action-gh-release@v2
        with:
          files: infer/target/release/metal_bench
