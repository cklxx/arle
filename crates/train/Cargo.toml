[package]
name = "train"
version.workspace = true
edition.workspace = true

[features]
default = []
no-cuda = ["autograd/no-cuda"]
metal = ["autograd/metal"]
cuda = ["autograd/cuda"]

[dependencies]
autograd = { path = "../autograd", default-features = false }
thiserror = { workspace = true }

[[bin]]
name = "train_tiny_lm"
path = "src/bin/train_tiny_lm.rs"

[[bin]]
name = "train_grpo"
path = "src/bin/train_grpo.rs"

[lints]
workspace = true
